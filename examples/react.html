<!doctype html>
<html lang='en'>
	<head>
		<meta charset='utf-8' />
		<title>Usero React wrapper smoke test</title>
		<script type='importmap'>
			{
				"imports": {
					"react": "https://esm.sh/react@18.2.0",
					"react-dom": "https://esm.sh/react-dom@18.2.0",
					"react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
					"react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
				}
			}
		</script>
	</head>
	<body>
		<h1>Usero React embed</h1>
		<p>The React-wrapped widget should appear pinned to the right edge.</p>
		<div id='root'></div>
		<script type='module'>
			import { createElement } from 'react'
			import { createRoot } from 'react-dom/client'
			import { UseroFeedbackWidget } from '../dist/react.js'

			function App() {
				return createElement(UseroFeedbackWidget, {
					clientId: 'demo-client-id',
					position: 'right',
				})
			}
			createRoot(document.getElementById('root')).render(createElement(App))
		</script>
	</body>
</html>
